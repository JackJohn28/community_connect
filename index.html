<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Community Connect</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>Community Connect</h1>
            <nav id="main-nav" style="display:none;">
                <button class="menu-btn" onclick="toggleMenu()">Menu &#9776;</button>
                <div id="nav-dropdown" class="dropdown-content">
                    <a href="#" onclick="showSection('dashboard')">Dashboard</a>
                    <a href="#" onclick="showSection('profile')">My Profile</a>
                    <a href="#" onclick="logout()">Logout</a>
                </div>
            </nav>
        </div>
    </header>

    <main>
        <section id="auth-section">
            <div class="card">
                <h2 id="auth-title">Login</h2>
                <div class="tabs">
                    <button id="tab-login" class="active" onclick="setAuthMode('login')">Login</button>
                    <button id="tab-reg" onclick="setAuthMode('reg')">Register</button>
                </div>

                <input type="text" id="username" placeholder="Username">
                <input type="password" id="password" placeholder="Password">
                
                <div id="reg-fields" style="display:none;">
                    <p>Select your role:</p>
                    <select id="user-role" onchange="updateRoleFields()">
                        <option value="volunteer">Volunteer</option>
                        <option value="caregiver">Caregiver</option>
                        <option value="org">Organization</option>
                    </select>
                    <div id="dynamic-questions" style="margin-top: 15px;"></div>
                </div>

                <p id="auth-error" style="color: #ff4d4d; font-size: 0.9em; margin-bottom: 10px; display: none;"></p>
                <button id="auth-submit" class="primary-btn" onclick="handleAuth()">Login</button>
            </div>
        </section>

        <section id="dashboard" style="display:none;">
            <h2 id="dash-title">Welcome</h2>
            <div class="grid" id="action-buttons"></div>
        </section>

        <section id="create-listing" style="display:none;">
            <div class="card">
                <h2>Create New Listing</h2>
                <label>Category:</label>
                <select id="post-type">
                    <option value="service">Service</option>
                    <option value="event">Event</option>
                    <option value="resource">Resource</option>
                </select>
                <input type="text" id="post-title" placeholder="Name of Event / Resource">
                <textarea id="post-desc" placeholder="Full Description..." rows="3"></textarea>

                <div id="volunteer-positions-container"></div>

                <button type="button" class="secondary-btn" onclick="addVolunteerRoleField()" style="background: #6c757d; margin-bottom: 15px;">
                    + Add Volunteer Position
                </button>

                <button class="primary-btn" onclick="submitListing()">Publish Listing</button>
                <button class="secondary-btn" onclick="showSection('dashboard')">Cancel</button>
            </div>
        </section>

        <section id="search" style="display:none;">
            <h2>Browse Listings</h2>
            <div id="search-results"></div>
            <button class="secondary-btn" onclick="showSection('dashboard')">Back to Dashboard</button>
        </section>

        <section id="profile" style="display:none;">
            <div class="card">
                <h2>My Profile</h2>
                <div id="profile-display"></div>
                <button class="primary-btn" onclick="showSection('dashboard')">Back</button>
            </div>
        </section>
    </main>

    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="script.js"></script>
</body>
</html>
